encoder:
  type: 's3prl'
  upstream: 'wavlm_base_plus'
  global_feature_grad_mult: 0.1
  avg_layer_features: true
  pooling: 'tdnn'
  frozen: false
method:
  type: 'simclr'
  enable_projector: false
  temperature: 0.03
trainer:
  epochs: 20
  learning_rate: 0.0001
  init_weights: 'models/foundation/voxceleb2/wavlm-base+_frozen_tdnn_simclr/checkpoints/model_epoch-9.pt'
evaluation:
  validation:
    - type: 'sv_cosine'
  test:
    - type: 'sv_cosine'
      frame_length: null
dataset:
  ssl: true
  train: 'voxceleb2_train.csv'
  augmentation:
    enable: true
