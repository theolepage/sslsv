encoder:
  type: 'resnet34'
method:
  type: 'moco_margins'
  loss:
    loss: 'nt-xent-arcface'
    margin: 0.05
  enable_projector: false
  queue_size: 32768
trainer:
  ddp_sync_batchnorm: false
evaluation:
  validation:
    - type: 'sv_cosine'
  test:
    - type: 'sv_cosine'
      frame_length: null
dataset:
  ssl: true
  train: 'voxceleb2_train.csv'
  augmentation:
    enable: true
